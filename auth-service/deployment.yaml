apiVersion: apps/v1
kind: Deployment
metadata: 
  name: auth-service
  labels: 
    app: auth-service
spec: 
  replicas: 2
  selector: 
    matchLabels: 
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec: 
      containers: 
        - name: auth-container
          image: adittt/mernstack_auth_service:build-128
          ports: 
            - containerPort: 5501
--- 
apiVersion: v1
kind: Service
metadata: 
  name: "auth-service"
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 5501
      targetPort: 5501


